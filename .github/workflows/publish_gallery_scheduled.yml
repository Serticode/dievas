name: Publish Gallery (Cleanup)

# Runs every Saturday at midnight UTC.
# Redeploys production with keep_previews=false to purge stale PR preview
# deployments that were never cleaned up after their branches were merged.
on:
    schedule:
        - cron: "0 0 * * 6"

jobs:
    publish_gallery_cleanup:
        uses: ./.github/workflows/publish_gallery.yml
        with:
            keep_previews: false
        secrets: inherit
