name: Publish Gallery (Labeled)

on:
    pull_request:
        types:
            - labeled
            - opened
            - synchronize
            - reopened
        paths:
            - "packages/dievas_gallery/**"
            - "packages/dievas/**"
            - "packages/dievas_tokens/**"
            - "landing/**"

jobs:
    publish_gallery_labeled:
        if: contains(join(github.event.pull_request.labels.*.name, ','), 'dievas-gallery-preview')
        uses: ./.github/workflows/publish_gallery.yml
        secrets: inherit
